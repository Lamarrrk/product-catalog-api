databaseChangeLog:
  - changeSet:
      id: 1-create-producers
      author: mark
      changes:
        - createTable:
            tableName: producers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 2-create-products
      author: mark
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: price
                  type: DECIMAL(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: attributes
                  type: JSON
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_producer
                    references: producers(id)
  - changeSet:
      id: 3-insert-initial-producers
      author: mark
      changes:
        - insert:
            tableName: producers
            columns:
              - column:
                  name: name
                  value: Samsung
        - insert:
            tableName: producers
            columns:
              - column:
                  name: name
                  value: Apple
        - insert:
            tableName: producers
            columns:
              - column:
                  name: name
                  value: Dell